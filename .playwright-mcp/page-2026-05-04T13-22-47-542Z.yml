    - main [ref=e115]:
      - generic [ref=e116]:
        - generic [ref=e118]:
          - generic [ref=e119] [cursor=pointer]:
            - generic [ref=e120]: "1"
            - text: Был один человек из Рамафаим-Цофима, с горы Ефремовой, имя ему Елкана, сын Иерохама, сына Илия, сына Тоху, сына Цуфа, — Ефрафянин;
            - generic "Есть параллельные места" [ref=e121]
          - generic [ref=e124] [cursor=pointer]:
            - generic [ref=e125]: "2"
            - text: "у него были две жены: имя одной Анна, а имя другой Феннана; у Феннаны были дети, у Анны же не было детей."
          - generic [ref=e128] [cursor=pointer]:
            - generic [ref=e129]: "3"
            - text: И ходил этот человек из города своего в положенные дни поклоняться и приносить жертву Господу Саваофу в Силом; там были [Илий и] два сына его, Офни и Финеес, священниками Господа.
          - generic [ref=e132] [cursor=pointer]:
            - generic [ref=e133]: "4"
            - text: В тот день, когда Елкана приносил жертву, давал Феннане, жене своей, и всем сыновьям ее и дочерям ее части;
          - generic [ref=e136] [cursor=pointer]:
            - generic [ref=e137]: "5"
            - text: Анне же давал часть особую, [так как у нее не было детей], ибо любил Анну [более, нежели Феннану], хотя Господь заключил чрево ее.
          - generic [ref=e140] [cursor=pointer]:
            - generic [ref=e141]: "6"
            - text: Соперница ее сильно огорчала ее, побуждая ее к ропоту на то, что Господь заключил чрево ее.
          - generic [ref=e144] [cursor=pointer]:
            - generic [ref=e145]: "7"
            - text: Так бывало каждый год, когда ходила она в дом Господень; та огорчала ее, а эта плакала [и сетовала] и не ела.
          - generic [ref=e148] [cursor=pointer]:
            - generic [ref=e149]: "8"
            - text: "И сказал ей Елкана, муж ее: Анна! [Она отвечала ему: вот я. И сказал ей:] что ты плачешь и почему не ешь, и отчего скорбит сердце твое? не лучше ли я для тебя десяти сыновей?"
          - generic [ref=e152] [cursor=pointer]:
            - generic [ref=e153]: "9"
            - text: И встала Анна после того, как они ели и пили в Силоме, [и стала пред Господом]. Илий же священник сидел тогда на седалище у входа в храм Господень.
          - generic [ref=e156] [cursor=pointer]:
            - generic [ref=e157]: "10"
            - text: И была она в скорби души, и молилась Господу, и горько плакала,
          - generic [ref=e160] [cursor=pointer]:
            - generic [ref=e161]: "11"
            - text: "и дала обет, говоря: Господи [Всемогущий Боже] Саваоф! если Ты призришь на скорбь рабы Твоей и вспомнишь обо мне, и не забудешь рабы Твоей и дашь рабе Твоей дитя мужеского пола, то я отдам его Господу [в дар] на все дни жизни его, [и вина и сикера не будет он пить,] и бритва не коснется головы его."
          - generic [ref=e164] [cursor=pointer]:
            - generic [ref=e165]: "12"
            - text: Между тем как она долго молилась пред Господом, Илий смотрел на уста ее;
          - generic [ref=e168] [cursor=pointer]:
            - generic [ref=e169]: "13"
            - text: и как Анна говорила в сердце своем, а уста ее только двигались, и не было слышно голоса ее, то Илий счел ее пьяною.
          - generic [ref=e172] [cursor=pointer]:
            - generic [ref=e173]: "14"
            - text: "И сказал ей Илий: доколе ты будешь пьяною? вытрезвись от вина твоего [и иди от лица Господня]."
          - generic [ref=e176] [cursor=pointer]:
            - generic [ref=e177]: "15"
            - text: "И отвечала Анна, и сказала: нет, господин мой; я — жена, скорбящая духом, вина и сикера я не пила, но изливаю душу мою пред Господом;"
          - generic [ref=e180] [cursor=pointer]:
            - generic [ref=e181]: "16"
            - text: не считай рабы твоей негодною женщиною, ибо от великой печали моей и от скорби моей я говорила доселе.
          - generic [ref=e184] [cursor=pointer]:
            - generic [ref=e185]: "17"
            - text: "И отвечал Илий и сказал: иди с миром, и Бог Израилев исполнит прошение твое, чего ты просила у Него."
          - generic [ref=e188] [cursor=pointer]:
            - generic [ref=e189]: "18"
            - text: "Она же сказала: да найдет раба твоя милость в очах твоих! И пошла она в путь свой, и ела, и лице ее не было уже печально, как прежде."
          - generic [ref=e192] [cursor=pointer]:
            - generic [ref=e193]: "19"
            - text: И встали они поутру, и поклонились пред Господом, и возвратились, и пришли в дом свой в Раму. И познал Елкана Анну, жену свою, и вспомнил о ней Господь.
          - generic [ref=e196] [cursor=pointer]:
            - generic [ref=e197]: "20"
            - text: "Чрез несколько времени зачала Анна и родила сына и дала ему имя: Самуил, ибо, [говорила она], от Господа [Бога Саваофа] я испросила его."
          - generic [ref=e200] [cursor=pointer]:
            - generic [ref=e201]: "21"
            - text: И пошел муж ее Елкана и все семейство его [в Силом] совершить годичную жертву Господу и обеты свои [и все десятины от земли своей].
          - generic [ref=e204] [cursor=pointer]:
            - generic [ref=e205]: "22"
            - text: "Анна же не пошла [с ним], сказав мужу своему: когда младенец отнят будет от груди и подрастет, тогда я отведу его, и он явится пред Господом и останется там навсегда."
          - generic [ref=e208] [cursor=pointer]:
            - generic [ref=e209]: "23"
            - text: "И сказал ей Елкана, муж ее: делай, что тебе угодно; оставайся, доколе не вскормишь его грудью; только да утвердит Господь слово, [вышедшее из уст твоих]. И осталась жена его, и кормила грудью сына своего, доколе не вскормила."
          - generic [ref=e212] [cursor=pointer]:
            - generic [ref=e213]: "24"
            - text: Когда же вскормила его, пошла с ним в Силом, взяв три тельца [и хлебы] и одну ефу муки и мех вина, и пришла в дом Господа в Силом, [и отрок с ними]; отрок же был еще дитя.
          - generic [ref=e216] [cursor=pointer]:
            - generic [ref=e217]: "25"
            - text: "[И привели его пред лице Господа; и принес отец его жертву, какую в установленные дни приносил Господу. И привели отрока] и закололи тельца; и привела отрока [Анна мать] к Илию"
          - generic [ref=e220] [cursor=pointer]:
            - generic [ref=e221]: "26"
            - text: "и сказала: о, господин мой! да живет душа твоя, господин мой! я — та самая женщина, которая здесь при тебе стояла и молилась Господу;"
          - generic [ref=e224] [cursor=pointer]:
            - generic [ref=e225]: "27"
            - text: о сем дитяти молилась я, и исполнил мне Господь прошение мое, чего я просила у Него;
          - generic [ref=e228] [cursor=pointer]:
            - generic [ref=e229]: "28"
            - text: и я отдаю его Господу на все дни жизни его, служить Господу. И поклонилась там Господу.
        - generic [ref=e235]:
          - generic [ref=e236]: ⬡
